<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NICE SHOP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia, serif;
}

html{
    scroll-behavior:smooth;
}

.hero{
    height:100vh;
    background-image:url("nice shop picture.png");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.hero h1{
    color:white;
    font-size:70px;
    text-shadow:3px 3px 10px black;
}

.hero p{
    color:white;
    font-size:24px;
    margin-top:10px;
}

.menu{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:50px;
}

.box{
    width:250px;
    padding:20px;
    border:3px solid gold;
    border-radius:15px;
    text-align:center;
    background:rgba(0,0,0,0.4);
}

.box a{
    color:white;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
}

.section{
    padding:80px 50px;
    background:#f8f8f8;
}

.section h2{
    text-align:center;
    color:#8b0000;
    margin-bottom:40px;
    font-size:40px;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
}

.gallery img{
    width:300px;
    height:400px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 0 10px gray;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.contact{
    background:#8b0000;
    color:white;
    text-align:center;
    padding:60px;
}

.contact h2{
    margin-bottom:20px;
}

.contact p{
    margin:10px;
    font-size:18px;
}

</style>

</head>

<body>

<section class="hero">





<div class="menu">

<div class="box">
<a href="#dress">Traditional Vietnamese Dress</a>
</div>

<div class="box">
<a href="#scarf">Silk Scarf</a>
</div>

<div class="box">
<a href="#bag">Hand Bag</a>
</div>

</div>

</section>

<section id="dress" class="section">

<h2>Traditional Vietnamese Dress</h2>

<div class="gallery">

<img src="ảnh1.jpg">
<img src="ảnh2.jpg">
<img src="ảnh3.jpg">

</div>

</section>

<section id="scarf" class="section">

<h2>Silk Scarf</h2>

<div class="gallery">

<img src="ảnh4.jpg">
<img src="anh5.jpg">
<img src="ảnh6.webp">

</div>

</section>

<section id="bag" class="section">

<h2>Hand Bag</h2>

<div class="gallery">

<img src="ảnh7.jpg">
<img src="ảnh8.jpg">
<img src="ảnh9.jpg">

</div>

</section>

<footer class="contact">

<h2>Contact Us</h2>

<p>📞 Phone: 0932122477</p>



<p>🌐 Facebook: DALAT FLOWERS</p>

<p>📍 Address: Da Lat, Vietnam</p>

</footer>

</body>
</html>
